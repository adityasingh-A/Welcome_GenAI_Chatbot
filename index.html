<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome to GenAI</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #833AB4, #E1306C, #F77737, #FCAF45);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-family: 'Segoe UI', sans-serif;
    }

    .card-custom {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        padding: 40px;
        text-align: center;
        box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        animation: fadeIn 1.5s ease-in-out;
    }

    h1 {
        font-weight: bold;
        margin-bottom: 20px;
        color: white;
    }

    .btn-custom {
        width: 150px;
        border-radius: 30px;
        font-weight: 600;
        margin: 10px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body>

<div class="card-custom">
    <h1>🚀 Welcome to GenAI</h1>
    <p class="mb-4">Your Smart AI Powered Portal</p>

    <a href="signup.jsp">
        <button class="btn btn-light btn-custom">Sign Up</button>
    </a>

    <a href="signin.jsp">
        <button class="btn btn-dark btn-custom">Sign In</button>
    </a>
</div>

</body>
</html>
